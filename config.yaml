    base_url: https://opencode.ai/zen/v1

  - name: north-mini-code-free
    provider: openai
    model: north-mini-code-free
    api_key: public
    base_url: https://opencode.ai/zen/v1

  - name: nemotron-3-ultra-free
    provider: openai
    model: nemotron-3-ultra-free
    api_key: public
    base_url: https://opencode.ai/zen/v1

  - name: deepseek-v4-flash-free
    provider: openai
    model: deepseek-v4-flash-free
    api_key: public
    base_url: https://opencode.ai/zen/v1
