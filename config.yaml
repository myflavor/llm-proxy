server:
  port: 5000
  api_key: sk-xin
  timeout_minutes: 10  # HTTP client timeout in minutes (default: 10)
  bug_report: true     # write bugreports/ on upstream errors (or env LLM_PROXY_BUG_REPORT=1)

models:
  # OpenCode Zen free models
  - name: mimo-v2.5-free
    provider: openai
    model: mimo-v2.5-free
